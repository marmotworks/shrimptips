AWSTemplateFormatVersion: '2010-09-09'
Description: 'ShrimpTips - Serverless webapp for generating OSHA-style safety posters for wild shrimp using AWS Bedrock Nova Canvas'

Parameters:
  DomainName:
    Type: String
    Default: 'shrimp.tips'
    Description: 'Domain name for the application'

  HostedZoneId:
    Type: String
    Description: 'Route 53 Hosted Zone ID for the domain'
    Default: ''

Resources:
  # IAM Role for Lambda functions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - 'arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-canvas-v1:0'
                  - 'arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0'
                  - 'arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-lite-v1:0'
                  - 'arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0'

  # Log Groups for Lambda functions (to minimize cost)
  PosterGeneratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-poster-generator'
      RetentionInDays: 7

  WebInterfaceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-web-interface'
      RetentionInDays: 7

  # API Gateway Logging configuration
  ApiGatewayLoggingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayLoggingRole.Arn

  # Lambda function for poster generation
  PosterGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-poster-generator'
      Runtime: python3.12
      Handler: poster_generator.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 600
      MemorySize: 512
      Code:
        ZipFile: |
          # Placeholder - will be replaced with actual code during deployment
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder function'}

  # Lambda function for web interface
  WebInterfaceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-web-interface'
      Runtime: python3.12
      Handler: web_interface.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          # Placeholder - will be replaced with actual code during deployment
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder function'}

  # API Gateway REST API
  ShrimpTipsApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      Description: 'API for ShrimpTips webapp'
      EndpointConfiguration:
        Types:
          - EDGE

  # API Gateway Resource for poster endpoint
  PosterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ShrimpTipsApi
      ParentId: !GetAtt ShrimpTipsApi.RootResourceId
      PathPart: 'api'

  PosterSubResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ShrimpTipsApi
      ParentId: !Ref PosterResource
      PathPart: 'poster'

  # GET method for poster generation
  PosterGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ShrimpTipsApi
      ResourceId: !Ref PosterSubResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PosterGeneratorFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true

  # OPTIONS method for CORS
  PosterOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ShrimpTipsApi
      ResourceId: !Ref PosterSubResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # GET method for root path (web interface)
  RootGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ShrimpTipsApi
      ResourceId: !GetAtt ShrimpTipsApi.RootResourceId
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebInterfaceFunction.Arn}/invocations'

  # Lambda permissions for API Gateway
  PosterLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PosterGeneratorFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ShrimpTipsApi}/*/*/*'

  WebInterfaceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebInterfaceFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ShrimpTipsApi}/*/*/*'

  # API Gateway Deployment
  ApiDeploymentV2:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PosterGetMethod
      - PosterOptionsMethod
      - RootGetMethod
    Properties:
      RestApiId: !Ref ShrimpTipsApi

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ShrimpTipsApi
      DeploymentId: !Ref ApiDeploymentV2
      StageName: 'prod'
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  # ACM Certificate for shrimp.tips (DNS-validated)
  ShrimpTipsCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasHostedZone
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS_VALIDATION
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  # CloudFront Distribution
  ShrimpTipsCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasHostedZone
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref DomainName
        Comment: 'ShrimpTips - Shrimp Safety Posters'
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: api-gateway-origin
            DomainName: !Sub '${ShrimpTipsApi}.execute-api.us-east-1.amazonaws.com'
            OriginPath: '/prod'
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: api-gateway-origin
          ViewerProtocolPolicy: allow-all
          AllowedMethods:
            - HEAD
            - GET
          CachedMethods:
            - HEAD
            - GET
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          Compress: true
          DefaultTTL: 0
          MaxTTL: 0
          MinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref ShrimpTipsCertificate
          SslSupportMethod: sni-only
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Restrictions:
          GeoRestriction:
            RestrictionType: none
        DefaultRootObject: ''

  # Route53 Alias Record pointing to CloudFront
  ShrimpTipsDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ShrimpTipsCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Conditions:
  HasHostedZone: !Not
    - !Equals
      - !Ref HostedZoneId
      - ''

Outputs:
  ApiGatewayUrl:
    Description: 'URL of the API Gateway'
    Value: !Sub 'https://${ShrimpTipsApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-api-url'

  PosterGeneratorFunctionArn:
    Description: 'ARN of the poster generator Lambda function'
    Value: !GetAtt PosterGeneratorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-poster-function-arn'

  WebInterfaceFunctionArn:
    Description: 'ARN of the web interface Lambda function'
    Value: !GetAtt WebInterfaceFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-web-function-arn'

  CloudFrontDomain:
    Description: 'CloudFront distribution domain name'
    Value: !If
      - HasHostedZone
      - !GetAtt ShrimpTipsCloudFrontDistribution.DomainName
      - 'Not configured - no HostedZoneId provided'
    Export:
      Name: !Sub '${AWS::StackName}-cloudfront-domain'

  CloudFrontDistributionId:
    Description: 'CloudFront distribution ID'
    Value: !If
      - HasHostedZone
      - !Ref ShrimpTipsCloudFrontDistribution
      - 'Not configured'
    Export:
      Name: !Sub '${AWS::StackName}-cloudfront-id'

  CertificateArn:
    Description: 'ACM Certificate ARN for shrimp.tips'
    Value: !If
      - HasHostedZone
      - !Ref ShrimpTipsCertificate
      - 'Not configured'
    Export:
      Name: !Sub '${AWS::StackName}-certificate-arn'
